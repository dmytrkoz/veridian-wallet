name: build-test

on:
  pull_request:
    types: [ opened, synchronize ]
  push:
    branches:
      - main
      - develop
      - release/**

env:
  NODE_OPTIONS: "--max_old_space_size=8192"

jobs:
  build-test:
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}

    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: "package.json"

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      # Lint all of src (not just src/core) so the es-x WebView ES-floor rules are
      # enforced on src/ui too — a post-Chrome-91 builtin there would white-screen
      # the app on old devices and slip past a src/core-only lint.
      run: npx eslint src --ext .ts,.tsx

    # tsc --noEmit covers the whole project incl. tests/, which the build
    # (ts-loader, src graph only) never type-checks.
    - name: Typecheck
      run: npm run typecheck

    - name: Run unit tests

      run: npm run test

    - name: 🔨 Build project
      run: npm run build
