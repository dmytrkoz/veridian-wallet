name: e2e-test

# Per-PR emulator e2e. Thin caller of the reusable engine (e2e.base.yaml) with the
# "pr" matrix profile: the APK is built once and fanned out to the smoke (@smoke)
# and offline (@offline) legs on api-34. The wide device-spread matrix runs nightly
# via e2e-scheduled.yaml - this file deliberately stays narrow and fast for PRs.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    # Path-gate the expensive emulator pipeline - skip docs-only PRs. Mirrors the
    # repo's own dependency-check path filtering. (integration-test stays unfiltered
    # as the cheap per-PR gate.)
    paths:
      - 'src/**'
      - 'tests/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'webpack.*'
      - 'docker-compose*.yaml'   # offline leg depends on the fault overlay
      - '.github/workflows/e2e-test.yaml'
      - '.github/workflows/e2e.base.yaml'

# Cancel a superseded e2e run when a new commit lands on the same ref - don't burn
# ~25 min of emulator time on a stale commit.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    uses: ./.github/workflows/e2e.base.yaml
    with:
      profile: pr
