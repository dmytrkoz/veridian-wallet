name: e2e-test

# Emulator e2e. The APK is built ONCE (e2e-build) and reused by the matrix legs
# (one per feature: multisig group-profile @smoke, offline @offline) which run in
# parallel — each its own emulator + KERIA. e2e-report merges both legs' Allure
# results into ONE report and deploys it to Pages.

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    # Path-gate the expensive emulator pipeline — skip docs-only PRs. Mirrors the
    # repo's own dependency-check path filtering. (integration-test stays unfiltered
    # as the cheap per-PR gate.)
    paths:
      - 'src/**'
      - 'tests/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'webpack.*'
      - '.github/workflows/e2e-test.yaml'

# Least-privilege default; the Pages deploy job widens its own.
permissions:
  contents: read

# Cancel a superseded e2e run when a new commit lands on the same ref — don't burn
# ~25 min of emulator time on a stale commit.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the debug APK ONCE (web bundle via cap sync is embedded in it, and
  # KERIA_IP=10.0.2.2 is identical for every leg), then fan out to the test legs —
  # instead of rebuilding the APK (~12 min of gradle) inside each leg.
  e2e-build:
    timeout-minutes: 25
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    steps:
      - name: Delete unnecessary tools 🔧
        if: ${{ runner.os == 'Linux' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false
          tool-cache: true
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: false
          large-packages: false

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build project for E2E
        timeout-minutes: 8
        run: |
          export LANG=en_US.UTF-8
          export KERIA_IP=10.0.2.2
          npm run build:e2e

      - name: Build Android APK
        timeout-minutes: 12
        run: |
          cd android
          ./gradlew assembleDebug --build-cache --parallel
          cd ..
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          # Normalise to a stable name so the legs can reference it directly.
          cp "$APK" app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-debug
          path: app-debug.apk
          if-no-files-found: error

  e2e:
    name: e2e (${{ matrix.name }})
    needs: e2e-build
    timeout-minutes: 30
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    strategy:
      fail-fast: false        # one leg failing must not cancel the other
      matrix:
        include:
          - name: multisig
            feature: ./tests/features/group-profiles/group-profile-initiator.feature
            tag: "@smoke"
          - name: offline
            feature: ./tests/features/offline/keria-offline.feature
            tag: "@offline"
    steps:
      - name: Delete unnecessary tools 🔧
        if: ${{ runner.os == 'Linux' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: false
          tool-cache: true
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: false
          large-packages: false

      - name: Enable KVM group perms
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # wdio/appium client deps only — no java/gradle here (APK comes from e2e-build).
        run: npm ci

      - name: Download prebuilt APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: app-debug
          path: .
      - name: Point APP_PATH at the downloaded APK
        run: echo "APP_PATH=$PWD/app-debug.apk" >> "$GITHUB_ENV"

      # Start KERIA + Appium up front so they warm while the AVD snapshot restores.
      - name: Start KERIA + witnesses
        run: docker compose up -d keria witnesses

      - name: Start Appium
        run: |
          # Pin to the version proven locally — `npm install -g appium` (latest)
          # drifted to 3.5.2 and broke the insecure-flag parse; 3.5.0 matches the
          # local hardening env for CI<->local parity.
          npm install -g appium@3.5.0
          appium driver install uiautomator2 || appium driver update uiautomator2
          # chromedriver_autodownload: appium fetches the chromedriver matching the
          # emulator's WebView at runtime to switch into the app's webview context.
          # Appium 3 rejects the bare unscoped feature unless --relaxed-security is
          # also set (the proven local invocation); safe here — appium binds
          # localhost on an ephemeral runner, no untrusted client.
          appium --log-level error --relaxed-security --allow-insecure chromedriver_autodownload &

      - name: Wait for KERIA + Appium to be ready
        run: |
          npx wait-on --timeout 120000 \
            tcp:127.0.0.1:3901 \
            tcp:127.0.0.1:3903 \
            tcp:127.0.0.1:5642 \
            http-get://127.0.0.1:4723/status

      # Cache the AVD + its boot snapshot across runs. First run (cache miss) creates
      # it and saves a snapshot; later runs restore and boot from the snapshot, which
      # cuts cold-boot + AVD creation. Key is pinned to the image coordinates.
      - name: AVD cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-google_apis-x86_64

      - name: Create AVD + generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-boot-timeout: 420
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-boot-anim
          disable-animations: false
          disk-size: 6000M
          heap-size: 600M
          script: echo "Generated AVD snapshot for caching."

      - name: Run E2E (${{ matrix.name }})
        # Hard cap so a stuck emulator/test fails fast (logs become readable)
        # instead of idling to the job timeout.
        timeout-minutes: 15
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        with:
          # api-34 for the per-PR smoke run (boots cleaner on hosted runners than
          # api-31). The Chrome-91 floor is guarded two ways: the es-x lint on every
          # PR, and a nightly api-31 leg (the cross-API matrix runs on a schedule,
          # not per-PR).
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false      # reuse the cached AVD
          emulator-boot-timeout: 420
          emulator-options: -no-window -no-audio -gpu swiftshader_indirect -no-snapshot-save -no-boot-anim
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          # Single line on purpose: the runner does not honor `\` continuations
          # here, and a split command silently drops the filter args (runs all
          # specs). `feature` scopes the spec; `tag` scopes the scenario/row.
          script: npm run wdio:android:s24ultra -- --spec ${{ matrix.feature }} --cucumberOpts.tagExpression=${{ matrix.tag }}

      # Per-leg: upload ONLY the raw results; e2e-report merges + generates once.
      - name: Upload Allure results (${{ matrix.name }})
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: allure-results-${{ matrix.name }}
          path: tests/.reports/allure-results
          if-no-files-found: warn

      - name: Dump KERIA logs on failure
        if: failure()
        run: docker compose logs keria witnesses

      - name: Cleanup
        if: always()
        run: |
          # The offline leg stops keria mid-run; restart before teardown so a crashed
          # run can't wedge a stopped container on a reused runner. No-op for multisig.
          docker start idw-keria || true
          pkill -f appium || true
          docker compose down -v

  # Merge both e2e legs' Allure results into ONE report (multisig + offline suites
  # together) and publish it to GitHub Pages so it's viewable at a URL with the
  # failure screenshots, without downloading the artifact. First-party actions only;
  # runs even on e2e failure. Same-repo runs only — fork PRs get a read-only token
  # and cannot deploy Pages.
  e2e-report:
    needs: e2e
    # Skip on fork PRs — they get a read-only token and cannot deploy Pages (the
    # deploy would hard-fail). workflow_dispatch and same-repo PRs still deploy.
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    permissions:
      contents: read    # a job-level permissions block REPLACES the default, so
      pages: write      # checkout needs contents:read spelled out here too
      id-token: write
    # Serialize Pages deploys across concurrent runs — github-pages is a single
    # live environment, so parallel deploys would 409/clobber each other.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # Provides the allure CLI (allure-commandline) used by `npx allure generate`.
        run: npm ci

      - name: Download all Allure results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: allure-results-*
          merge-multiple: true       # flatten both legs into one results dir
          path: tests/.reports/allure-results

      - name: Generate combined Allure report
        # No `|| true`: a generate failure must fail the job (and skip the deploy
        # below) rather than publish an empty/stale report as green.
        run: npx allure generate tests/.reports/allure-results --clean -o tests/.reports/allure-report

      - name: Combined E2E summary
        if: always()
        run: |
          f=tests/.reports/allure-report/widgets/summary.json
          [ -f "$f" ] || { echo "No allure summary." >> "$GITHUB_STEP_SUMMARY"; exit 0; }
          {
            echo "## E2E (combined: multisig + offline)"
            jq -r '.statistic | "Total: \(.total) · Passed: \(.passed) · Failed: \(.failed) · Broken: \(.broken) · Skipped: \(.skipped)"' "$f"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined Allure report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-allure-combined
          path: tests/.reports/allure-report
          if-no-files-found: warn

      # Pages is best-effort: the combined report is always kept as an artifact
      # above. On a repo without Pages enabled the deploy fails — tolerate it
      # (continue-on-error) so it never reds the run that proved the tests.
      - name: Upload Allure report as Pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: tests/.reports/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
