version: "3.9"
services:
  keria:
    container_name: idw-keria
    restart: unless-stopped
    image: ghcr.io/cardano-foundation/cf-identity-wallet/cf-idw-keria:1.2.0-fix-VT20-2191-Un-ordered-exchange-queries-pagination-is-not-reliable-re-orders-a-a1cbe1f
    environment:
      - KERI_AGENT_CORS=true
      - ALLOW_INTRODUCTIONS=true
      - REMOTE_SIGNING=true
    volumes:
      - keria-data:/usr/local/var/keri
      - ./keria-config/config.json:/keria/scripts/keri/cf/backer-oobis.json
    entrypoint: keria start --config-file backer-oobis --config-dir ./scripts --loglevel INFO
    # Readiness gate: the admin port is accepting connections. Lets the fault
    # overlay's toxiproxy wait for a live upstream before it opens its listeners,
    # so wait-on against the proxy can't pass while keria is still booting.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('127.0.0.1', 3901), 2).close()\""]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s
    # Direct host ports — integration + multisig connect straight to keria. The
    # offline/resilience jobs layer docker-compose.fault.yaml on top, which strips
    # these and fronts keria with Toxiproxy on the same ports.
    ports:
      - 3901:3901
      - 3902:3902
      - 3903:3903

  witnesses:
    container_name: idw-witnesses
    restart: unless-stopped
    image: weboftrust/keri:1.1.26
    environment:
        - PYTHONUNBUFFERED=1
        - PYTHONIOENCODING=UTF-8
    entrypoint:
        - kli
    command:
        - witness
        - demo
    volumes:
        - ./keria-config/witnesses:/keripy/scripts/keri/cf/main
    ports:
      - 5642:5642
      - 5643:5643
      - 5644:5644
      - 5645:5645
      - 5646:5646
      - 5647:5647

  cred-issuance:
    container_name: cred-issuance
    build:
      context: ./services/credential-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - OOBI_ENDPOINT=http://cred-issuance:3001
      - KERIA_ENDPOINT=http://keria:3901
      - KERIA_BOOT_ENDPOINT=http://keria:3903
    ports:
      - 3001:3001
    volumes:
      - issuer-server-data:/app/data

  cred-issuance-ui:
    container_name: cred-issuance-ui
    build:
      context: ./services/credential-server-ui
      dockerfile: ./Dockerfile
    restart: unless-stopped
    environment:
      - VITE_SERVER_URL=${VITE_SERVER_URL:-http://localhost:3001}
    ports:
      - 3000:80

volumes:
  keria-data:
  issuer-server-data:
