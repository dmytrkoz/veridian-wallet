# CI-only: run KERIA on host network so the Android emulator (10.0.2.2 = host) can reach it.
# With network_mode: host, KERIA listens on the runner's 3901/3903 directly (no Docker bridge).
# Use: docker compose -f docker-compose.yaml -f docker-compose.ci.yaml up -d keria
services:
  keria:
    network_mode: host
